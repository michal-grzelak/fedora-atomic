---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# make podman a default
modules:
  # disable docker and root podman
  - type: systemd
    system:
      disabled:
        - docker.socket
        - docker.service
        - podman.socket

  # enable rootless podman
  - type: systemd
    user:
      enabled:
        - podman.socket

  - type: dnf
    remove:
      packages:
        - docker-ce
        - docker-ce-cli
      auto-remove: true
    install:
      packages:
        - podman-docker

  # link docker to podman for compatibility
  - type: files
    files:
      - source: podman
        destination: /
