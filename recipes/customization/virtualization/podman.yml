---
# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
# make podman a default
modules:
  # disable docker and root podman
  - type: systemd
    system:
      disabled:
        - docker.socket
        - docker.service
        - podman.socket

  # enable rootless podman
  - type: systemd
    user:
      enabled:
        - podman.socket

  # link docker to podman for compatibility
  - type: files
    files:
      - source: podman
        destination: /
