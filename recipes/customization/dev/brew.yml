---
# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  - type: brew
    nofile-limits: true
    brew-analytics: false
    update-interval: 1d
    upgrade-interval: 1d

  # remove default completions
  - type: script
    snippets:
      - "rm /usr/share/fish/vendor_conf.d/brew-fish-completions.fish"
      - "rm /usr/share/fish/vendor_conf.d/ublue-brew.fish"
