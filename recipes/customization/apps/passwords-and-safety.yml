---
# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  # 1Password from official repository
  - type: bling
    install:
      - 1password

  # proton pass
  - type: dnf
    install:
      packages:
        - https://proton.me/download/PassDesktop/linux/x64/ProtonPass.rpm

  # adguard cli
  - type: script
    scripts:
      - install-adguard.sh
