---
# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (managed)
        install:
          # office suite
          # - org.libreoffice.LibreOffice
          - org.onlyoffice.desktopeditors
          # Okular - pdf reader
          - org.kde.okular
          # Skanpage - scanner
          - org.kde.skanpage
          # Gwenview - photo viewer
          - org.kde.gwenview
          # VLC - video player
          - org.videolan.VLC
          # Calculator
          - org.gnome.Calculator
