---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v2.json
version: 2
spec:
  platforms:
    - linux/amd64/v2
base:
  image: ghcr.io/ublue-os/aurora:stable
metadata:
  # image will be published to ghcr.io/<user>/<name>
  name: aurora
  # description will be included in the image's metadata
  description: Personalized Aurora image.
  tags:
    - stable

modules:
  - from-file: common-amd.yml

  # regenerate initramfs
  - type: initramfs

  # this sets up the proper policy & signing files for signed images to work fully
  - type: signing
